name: CI · PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          for path in AGENTS.md LICENSE README.md SKILL.md Makefile scripts/window/count.applescript tests/dictionary_contract.sh tests/smoke_terminal.sh; do
            [ -f "$path" ] || { echo "::error::Missing $path"; exit 1; }
          done
      - run: make compile
      - run: make test
